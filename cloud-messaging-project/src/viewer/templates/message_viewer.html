<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Viewer</title>
  <style>
    :root {
      --primary-blue: #1f3a60;
      --secondary-blue: #3a6ea5;
      --light-blue: #eaf2fb;
      --text-dark: #1a1a1a;
      --text-muted: #6b7280;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", Arial, sans-serif;
      font-size: 14px;
      background: var(--light-blue);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .container {
      width: 80%;
      margin: 3rem auto;
      background: white;
      padding: 2.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--primary-blue);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--light-blue);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--secondary-blue);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-blue);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1rem;
    }

    .toolbar input,
    .toolbar select {
      font-size: 13px;
      padding: 7px 10px;
      border: 1.5px solid #d1d5db;
      border-radius: var(--radius-md);
      background: #fff;
      color: var(--text-dark);
      height: 36px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .toolbar input { flex: 1; min-width: 200px; }

    .toolbar input:focus,
    .toolbar select:focus { border-color: var(--secondary-blue); }

    .toolbar button {
      height: 36px;
      padding: 0 16px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      background: var(--primary-blue);
      color: white;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    .toolbar button:hover { background: var(--secondary-blue); }
    .toolbar button:active { transform: scale(0.98); }

    .toolbar button.btn-reset {
      background: transparent;
      color: var(--primary-blue);
      border: 1.5px solid #d1d5db;
    }

    .toolbar button.btn-reset:hover {
      background: var(--light-blue);
      border-color: var(--secondary-blue);
    }

    .table-wrap {
      border: 1.5px solid #d1d5db;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    thead th {
      background: var(--light-blue);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: var(--primary-blue);
      border-bottom: 1.5px solid #d1d5db;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    th:nth-child(1) { width: 4%; }
    th:nth-child(2) { width: 20%; }
    th:nth-child(3) { width: 30%; }
    th:nth-child(4) { width: 22%; }
    th:nth-child(5) { width: 12%; }
    th:nth-child(6) { width: 12%; }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--light-blue); }

    tbody td {
      padding: 10px 14px;
      color: var(--text-dark);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td:first-child { color: var(--text-muted); }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .badge-dup { background: #c62828; color: #fff; }
    .badge-new { background: #e8f5e9; color: #2e7d32; }

    tbody tr.row-duplicate {
      background: #fff3f3;
      border-left: 4px solid #c62828;
    }

    tbody tr.row-duplicate:hover { background: #ffe8e8; }

    tbody tr.data-row { cursor: pointer; }

    tbody tr.expand-row td {
      padding: 12px 14px 16px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      white-space: normal;
      word-break: break-all;
    }

    tbody tr.expand-row.row-duplicate td { background: #fff8f8; }

    .expand-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 6px 12px;
      font-size: 12px;
    }

    .expand-label {
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding-top: 2px;
    }

    .expand-value {
      color: var(--text-dark);
      font-family: monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 14px;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .pagination button {
      padding: 5px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      background: var(--primary-blue);
      color: white;
      cursor: pointer;
      margin-left: 6px;
      transition: background 0.2s;
    }

    .pagination button:disabled { opacity: 0.35; cursor: default; }
    .pagination button:not(:disabled):hover { background: var(--secondary-blue); }

    @media (max-width: 900px) {
      .container { width: 95%; padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <h1>Emergency Messaging System</h1>

  <div class="stats">
    <div class="stat"><div class="stat-label">total messages</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">unique</div><div class="stat-value" id="s-unique">—</div></div>
    <div class="stat"><div class="stat-label">duplicates</div><div class="stat-value" id="s-dups">—</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search by message ID or content..." />
    <select id="filter-dup">
      <option value="all">All messages</option>
      <option value="0">Unique only</option>
      <option value="1">Duplicates only</option>
    </select>
    <select id="filter-severity">
      <option value="all">All severities</option>
      <option value="critical">🚨 Critical</option>
      <option value="high">⚠️ High</option>
      <option value="medium">⚠️ Medium</option>
      <option value="low">✅ Low</option>
    </select>
    <select id="sort-combined">
      <option value="id|desc">Sort by row — newest first</option>
      <option value="id|asc">Sort by row — oldest first</option>
      <option value="created_at|desc">Sort by date — newest first</option>
      <option value="created_at|asc">Sort by date — oldest first</option>
      <option value="severity|asc">Sort by severity — critical first</option>
      <option value="severity|desc">Sort by severity — low first</option>
      <option value="message_id|asc">Sort by message ID — A to Z</option>
      <option value="message_id|desc">Sort by message ID — Z to A</option>
    </select>
    <button class="btn-reset" onclick="resetFilters()">↺ Reset</button>
    <button onclick="loadMessages()">Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Message ID</th>
          <th>Content</th>
          <th>Created at</th>
          <th>Severity</th>
          <th>Duplicate</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">Loading messages...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>

  <script>
    const PAGE_SIZE = 20;
    let allData = [];
    let page = 0;

    async function loadMessages() {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Loading...</td></tr>';
      try {
        const res = await fetch('/messages');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allData = await res.json();
        page = 0;
        render();
      } catch (e) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Could not connect to API. Make sure Flask is running on port 5001.</td></tr>';
      }
    }
    // Severity sort order: critical > high > medium > low
    const severityOrder = { critical: 0, high: 1, medium: 2, low: 3 };

    function filtered() {
      const q       = document.getElementById('search').value.toLowerCase();
      const dup     = document.getElementById('filter-dup').value;
      const sev     = document.getElementById('filter-severity').value;
      const [field, dir] = document.getElementById('sort-combined').value.split('|');

      let rows = allData.filter(r => {
        const matchQ   = !q || r.message_id.toLowerCase().includes(q) || r.content.toLowerCase().includes(q);
        const matchDup = dup === 'all' || String(r.is_duplicate) === dup;
        const matchSev = sev === 'all' || (r.severity || '').toLowerCase() === sev;
        return matchQ && matchDup && matchSev;
      });

      rows.sort((a, b) => {
        let av, bv;
        if (field === 'severity') {
          av = severityOrder[(a.severity || '').toLowerCase()] ?? 99;
          bv = severityOrder[(b.severity || '').toLowerCase()] ?? 99;
        } else {
          av = a[field];
          bv = b[field];
          if (typeof av === 'string') av = av.toLowerCase();
          if (typeof bv === 'string') bv = bv.toLowerCase();
        }
        if (av < bv) return dir === 'asc' ? -1 : 1;
        if (av > bv) return dir === 'asc' ? 1 : -1;
        return 0;
      });

      return rows;
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('filter-dup').value = 'all';
      document.getElementById('filter-severity').value = 'all';
      document.getElementById('sort-combined').value = 'id|desc';
      page = 0;
      render();
    }

    function severityBadge(severity) {
      if (!severity) return '<span style="color:var(--text-muted);">—</span>';
      const s = severity.toLowerCase();
      return `<span style="font-weight: 600; text-transform: uppercase; font-size: 12px;">${s}</span>`;
    }

    function formatTimestamp(ts) {
      if (!ts) return '—';
      // Trim to seconds: "2026-04-06 10:00:00.123456" → "2026-04-06 10:00:00"
      return ts.split('.')[0];
    }

    function render() {
      const rows = filtered();
      const total = allData.length;
      const dups = allData.filter(r => r.is_duplicate == 1).length;

      document.getElementById('s-total').textContent = total;
      document.getElementById('s-unique').textContent = total - dups;
      document.getElementById('s-dups').textContent = dups;

      const start = page * PAGE_SIZE;
      const slice = rows.slice(start, start + PAGE_SIZE);
      const tbody = document.getElementById('tbody');

      if (!slice.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No messages found.</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      tbody.innerHTML = slice.map(r => {
        const isDup = r.is_duplicate == 1;
        const dupClass = isDup ? 'row-duplicate' : '';
        const dupBadge = isDup
          ? '<span class="badge badge-dup">duplicate</span>'
          : '<span class="badge badge-new">unique</span>';
        return `
        <tr class="data-row ${dupClass}" onclick="toggleExpand(this, ${r.id})">
          <td>${r.id}</td>
          <td title="${r.message_id}">${r.message_id}</td>
          <td title="${r.content}">${r.content}</td>
          <td>${formatTimestamp(r.created_at)}</td>
          <td>${severityBadge(r.severity)}</td>
          <td>${dupBadge}</td>
        </tr>
        <tr class="expand-row ${dupClass}" id="expand-${r.id}" style="display:none;">
          <td colspan="6">
            <div class="expand-grid">
              <span class="expand-label">Message ID</span>
              <span class="expand-value">${r.message_id}</span>
              <span class="expand-label">Content</span>
              <span class="expand-value">${r.content}</span>
            </div>
          </td>
        </tr>`;
      }).join('');

      const totalPages = Math.ceil(rows.length / PAGE_SIZE);
      document.getElementById('pagination').innerHTML = rows.length > PAGE_SIZE
        ? `<span>Showing ${start + 1}–${Math.min(start + PAGE_SIZE, rows.length)} of ${rows.length}</span>
           <span>
             <button onclick="changePage(-1)" ${page === 0 ? 'disabled' : ''}>← prev</button>
             <button onclick="changePage(1)" ${page >= totalPages - 1 ? 'disabled' : ''}>next →</button>
           </span>`
        : `<span>${rows.length} result${rows.length !== 1 ? 's' : ''}</span>`;
    }

    function changePage(d) { page = Math.max(0, page + d); render(); }

    function toggleExpand(row, id) {
      const expandRow = document.getElementById('expand-' + id);
      const isOpen = expandRow.style.display !== 'none';
      expandRow.style.display = isOpen ? 'none' : 'table-row';
    }

    ['search', 'filter-dup', 'filter-severity', 'sort-combined'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => { page = 0; render(); });
    });

    // --- Auto-refresh ---
    const REFRESH_INTERVAL = 10;

    async function autoRefresh() {
      try {
        const res = await fetch('/messages');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allData = await res.json();
        render();
      } catch (e) {
        // silently fail — don't disrupt the UI
      }
    }

    // Initial load
    loadMessages();

    // Start polling after initial load
    setInterval(autoRefresh, REFRESH_INTERVAL * 1000);
  </script>
</div>
</body>
</html>
