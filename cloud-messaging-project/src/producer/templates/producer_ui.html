<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Messaging - Producer</title>
  <style>
    :root {
      --primary-blue: #1f3a60;
      --secondary-blue: #3a6ea5;
      --light-blue: #eaf2fb;
      --danger-red: #d32f2f;
      --warning-orange: #f57c00;
      --medium-yellow: #fbc02d;
      --safe-green: #2e7d32;
      --text-dark: #1a1a1a;
      --text-muted: #6b7280;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", Arial, sans-serif;
      background: var(--light-blue);
      color: var(--text-dark);
      padding: 0;
    }

    .container {
      width: 60%;
      margin: 3rem auto;
      background: white;
      padding: 2.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    .container h1 {
      color: var(--primary-blue);
      margin-bottom: 1.75rem;
      font-size: 1.6rem;
    }

    .container h2 {
      color: var(--secondary-blue);
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 1.75rem;
    }

    h2.section-title {
      color: var(--primary-blue);
      font-size: 1.1rem;
      font-weight: 600;
      margin: 2rem 0 1rem;
    }

    .form { display: flex; flex-direction: column; gap: 1.25rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--primary-blue);
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text-dark);
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--secondary-blue);
    }

    textarea { resize: vertical; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .input-error {
      border-color: var(--danger-red) !important;
      border-width: 2.5px !important;
      animation: shake 0.35s ease;
    }

    .input-error:focus {
      border-color: var(--danger-red) !important;
    }

    button[type="submit"] {
      padding: 0.75rem 1.5rem;
      background: var(--primary-blue);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: var(--secondary-blue); }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { background: #9ca3af; cursor: not-allowed; }

    .status-msg {
      font-size: 0.875rem;
      padding: 0.6rem 1rem;
      border-radius: var(--radius-md);
      display: none;
    }

    .status-msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status-msg.error   { display: block; background: #ffebee; color: #c62828; }

    .message {
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
      border-radius: var(--radius-md);
      font-weight: 500;
      line-height: 1.5;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    .message small { opacity: 0.8; font-size: 0.8rem; }

    .critical {
      background: linear-gradient(90deg, #b71c1c, var(--danger-red));
      color: white;
      border-left: 8px solid #7f0000;
    }

    .high {
      background: linear-gradient(90deg, #ef6c00, var(--warning-orange));
      color: white;
      border-left: 8px solid #e65100;
    }

    .medium {
      background: linear-gradient(90deg, #f9a825, var(--medium-yellow));
      color: #1a1a1a;
      border-left: 8px solid #f57f17;
    }

    .low {
      background: linear-gradient(90deg, #1b5e20, var(--safe-green));
      color: white;
      border-left: 8px solid #1b5e20;
    }

    @media (max-width: 900px) {
      .container { width: 90%; padding: 2rem; }
    }
  </style>
</head>

<body>
<div class="container">

  <h1>Emergency Messaging System</h1>

  <form id="messageForm" class="form" novalidate>

    <div class="form-group">
      <label for="content">Message Content</label>
      <textarea id="content" rows="4" placeholder="Enter message content..." required></textarea>
    </div>

    <div class="form-group">
      <label for="urgency">Severity</label>
      <select id="urgency" required>
        <option value="" disabled selected>Select severity level...</option>
        <option value="critical">🚨 Critical</option>
        <option value="high">⚠️ High</option>
        <option value="medium">⚠️ Medium</option>
        <option value="low">✅ Low</option>
      </select>
    </div>

    <div class="form-group">
      <button type="submit" id="submitBtn">Send Alert</button>
      <p class="status-msg" id="statusMsg"></p>
    </div>

  </form>

  <h2 class="section-title">Message Logs</h2>
  <div id="messages" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>

</div>

<script>
  document.getElementById("messageForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const contentEl = document.getElementById("content");
    const urgencyEl = document.getElementById("urgency");
    const btn       = document.getElementById("submitBtn");
    const status    = document.getElementById("statusMsg");

    const content = contentEl.value.trim();
    const urgency = urgencyEl.value;

    // Red outline validation
    let hasError = false;
    if (!content) {
      contentEl.classList.add("input-error");
      hasError = true;
    } else {
      contentEl.classList.remove("input-error");
    }
    if (!urgency) {
      urgencyEl.classList.add("input-error");
      hasError = true;
    } else {
      urgencyEl.classList.remove("input-error");
    }
    if (hasError) return;

    btn.disabled = true;
    btn.textContent = "Sending...";
    status.className = "status-msg";
    status.textContent = "";

    try {
      const res = await fetch("/publish", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: content, severity: urgency })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || "Unknown error");

      status.className = "status-msg success";
      status.textContent = "Alert sent successfully.";

      // Log success entry with message_id returned from API
      addLog({ status: "success", content, urgency, time: new Date().toLocaleString(), message_id: data.message_id });

      document.getElementById("messageForm").reset();
      contentEl.classList.remove("input-error");
      urgencyEl.classList.remove("input-error");

    } catch (err) {
      status.className = "status-msg error";
      status.textContent = "Failed to send: " + err.message;

      addLog({ status: "failure", content, urgency, time: new Date().toLocaleString(), error: err.message });
    } finally {
      btn.disabled = false;
      btn.textContent = "Send Alert";
    }
  });

  // Clear red outline on input
  document.getElementById("content").addEventListener("input", function() {
    this.classList.remove("input-error");
  });
  document.getElementById("urgency").addEventListener("change", function() {
    this.classList.remove("input-error");
  });

  const severityStyles = {
    critical: { bg: "#ffebee", border: "#d32f2f", text: "#b71c1c" },
    high:     { bg: "#fff3e0", border: "#f57c00", text: "#e65100" },
    medium:   { bg: "#fffde7", border: "#fbc02d", text: "#f57f17" },
    low:      { bg: "#e8f5e9", border: "#2e7d32", text: "#1b5e20" },
  };

  function addLog(log) {
    const div = document.createElement("div");
    const isSuccess = log.status === "success";
    const style = severityStyles[log.urgency] || { bg: "#f5f5f5", border: "#9e9e9e", text: "#616161" };

    div.style.cssText = `
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      background: ${style.bg};
      border-left: 4px solid ${style.border};
      color: var(--text-dark);
    `;

    const icon = isSuccess ? "✅" : "❌";
    const label = isSuccess ? "SUCCESS" : "FAILED";
    const detail = isSuccess
      ? `${log.content}`
      : `${log.content} — ${log.error}`;
    const msgId = log.message_id
      ? `<span style="color: var(--text-muted); font-size: 0.8rem;">ID: ${log.message_id}</span>`
      : "";

    div.innerHTML = `
      <span style="font-size: 1rem; line-height: 1.4;">${icon}</span>
      <div style="flex:1;">
        <span style="font-weight: 600; color: ${style.text};">${label}</span>
        <span style="color: var(--text-muted); margin: 0 6px;">·</span>
        <small style="color: var(--text-muted);">${log.time}</small>
        <span style="color: var(--text-muted); margin: 0 6px;">·</span>
        <small style="color: var(--text-muted); text-transform: uppercase; font-weight: 600;">${log.urgency}</small>
        <div style="margin-top: 4px;">${detail}</div>
        ${msgId}
      </div>
    `;

    document.getElementById("messages").prepend(div);
  }
</script>

</body>
</html>
